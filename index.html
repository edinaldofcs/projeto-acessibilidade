<!DOCTYPE html>

          <button class="especiais" value=" ">ESPAÇO</button>
          <button class="especiais" value="apagar">APAGAR</button>
          <button class="especiais">SALVAR</button>
          <button class="especiais" value = "falar">FALAR</button>
          <button class="especiais" value="limpar">LIMPAR</button>
          <button class="especiais">FRASES</button>
          <button class="especiais">IR PARA</button>

      <section class="text_area">
        <h1>Digite seu texto</h1>
        <p id="selecao"></p>
        <span class="sound" id="sound">🔊</span>
        <textarea
          class="text"
          name="text"
          id="text"
          placeholder="Seu texto aparecerá aqui"
        ></textarea>
      </section>
    </main>
    <canvas id="canvas" width="600px" height="400px"></canvas>
    <div id="ponto_ref">.</div>
    <div id="mouse" class="mouse"></div>
    <script type="module" src="index.js"></script>
  </body>
</html>
